# Fish Detection Node Configuration
# ============================================================================
#
# QUICK START:
#   cd ~/AquaSweep/water_ws
#   ros2 run aqua_detection fish_detection_node --ros-args \
#       --params-file src/aqua_detection/config/fish_detection_params.yaml
#
# ============================================================================

fish_detection_node:
  ros__parameters:
    use_global_camera: true      # /global/top_img_raw (true) or /pool_N/top_img_raw (false)
    num_pools: 7
    debug_visualization: true    # /pool_N/top_img_det

    image_qos_reliability: "best_effort"
    image_qos_depth: 10

    # YOLO OBB — models/yolo26n_fish_species_v1.pt (sturgeon only)
    yolo:
      model_path: "models/yolo26n_fish_species_v1.pt"
      confidence_threshold: 0.5
      iou_threshold: 0.45
      imgsz: 640
      half: true
      debris_min_area: 3         # OpenCV blob detector (not a .pt model)
      debris_max_area: 8

    # suspicious when debug overlay C (bg_contrast) >= this (per YOLO bbox)
    classifier:
      contrast_threshold: 8.0
