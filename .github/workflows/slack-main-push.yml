name: Slack Notify - Main Push & Merge

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":github: *${{ github.repository }}* main 업데이트",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Main 브랜치 업데이트"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.head_commit.message }}*\nby *${{ github.event.head_commit.author.name }}*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "• *커밋*: <${{ github.event.head_commit.url }}|${{ github.sha }}>\n• *PR*: ${{ github.event.head_commit.message == 'Merge pull request' && format('<{0}|PR #{1}>', github.event.pull_request.html_url, github.event.pull_request.number) || '직접 Push' }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Repository: *${{ github.repository }}*"
                    }
                  ]
                }
              ]
            }
